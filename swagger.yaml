openapi: 3.0.0
info:
  title: School Management API
  description: API for managing schools and finding the nearest ones based on user location.
  version: 1.0.0
servers:
  - url: https://school-management-api-flgy.onrender.com/api/v1
    description: Production server
paths:
  /addSchool:
    post:
      summary: Add a new school
      description: Adds a new school with latitude and longitude to the database.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - address
                - latitude
                - longitude
              properties:
                name:
                  type: string
                  example: ABC School
                address:
                  type: string
                  example: Pune, Maharashtra
                latitude:
                  type: number
                  format: float
                  example: 18.5204
                longitude:
                  type: number
                  format: float
                  example: 73.8567
      responses:
        '201':
          description: School added successfully
        '400':
          description: Validation failed
        '409':
          description: School already exists

  /listSchools:
    get:
      summary: List nearest schools
      description: Fetches a list of all schools sorted by distance from the provided coordinates.
      parameters:
        - in: query
          name: latitude
          required: true
          schema:
            type: number
            format: float
          description: User's current latitude
        - in: query
          name: longitude
          required: true
          schema:
            type: number
            format: float
          description: User's current longitude
        - in: query
          name: page
          required: false
          schema:
            type: integer
          description: Pagination page number (default 1)
        - in: query
          name: limit
          required: false
          schema:
            type: integer
          description: Pagination limit (default 10)
        - in: query
          name: name
          required: false
          schema:
            type: string
          description: Search school by name
        - in: query
          name: radius
          required: false
          schema:
            type: number
          description: Filter schools within specific radius in km
      responses:
        '200':
          description: Schools retrieved successfully
        '400':
          description: Validation failed
